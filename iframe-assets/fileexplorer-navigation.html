<!DOCTYPE html>
<html>

<!-- metadata -->
  <head>
    
    <title> File Explorer </title>
    <link href="https://mentholgrrl.neocities.org/style.css" rel="stylesheet" type="text/css">
    <!-- css: cascading style sheets -->
    <style>
      @font-face {
        font-family: 'Nunito';
        src: url(https://mintymints.neocities.org/Nunito/specimen_files/nunito-variablefont_wght-webfont.woff);
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <link rel="icon" href="https://mentholgrrl.neocities.org/imageassets/titles/file-folder.png">
    </head>
    
  <!-- elements (skeleton) -->
  <body>

<div class="left-megawrapper">
<!-- NAVIGATION -->
      <div class="explorer-navigation">
        <a>
          <div class="clickable explorer-shell" style="border-left: #493163 0px solid;">
              <img src="https://mentholgrrl.neocities.org/imageassets/titles/file-back-blue.png">
          </div>
        </a>
        <a class="no-phone">
        <div class="clickable explorer-shell no-phone">
            <img src="https://mentholgrrl.neocities.org/imageassets/titles/file-back-blue.png" style="-ms-transform: rotate(-0.5turn); -webkit-transform: rotate(-0.5turn); transform: rotate(-0.5turn);">
        </div>
        </a>
        <a href="https://mentholgrrl.neocities.org/my-room/desk">
        <div class="clickable explorer-shell">
            <img src="https://mentholgrrl.neocities.org/imageassets/titles/file-back-blue.png" style="-ms-transform: rotate(-0.5turn); -webkit-transform: rotate(-0.5turn); transform: rotate(0.25turn);">
        </div>
        </a>
        <a class="no-phone">
        <div class="clickable explorer-shell no-phone">
            <img src="https://mentholgrrl.neocities.org/imageassets/titles/refresh-blue.png">
        </div>
        </a>
      </div>
      
  <!-- CATEGORIES/FOLDERS -->
      <div class="categories">
        
        <a href="https://mentholgrrl.neocities.org/carnelian/downloads"> <div class="category-shell clickable">
          <div class="category-icon"> <img class="file" src="https://mentholgrrl.neocities.org/imageassets/titles/file-downloads-blue-bigger.png"> </div>
          <div class="category-name"> Downloads </div>
        </div> </a>
        
        <a href="https://mentholgrrl.neocities.org/carnelian/documents"> <div class="category-shell clickable">
          <div class="category-icon"> <img class="file" src="https://mentholgrrl.neocities.org/imageassets/titles/file-text-blue.png"> </div>
          <div class="category-name"> Documents </div>
        </div> </a>
        
        <a href="https://mentholgrrl.neocities.org/carnelian/pictures"> <div class="category-shell clickable">
          <div class="category-icon"> <img class="file" src="https://mentholgrrl.neocities.org/imageassets/titles/file-image-blue.png"> </div>
          <div class="category-name"> Pictures </div>
        </div> </a>
        
        <a href="https://mentholgrrl.neocities.org/carnelian/music"> <div class="category-shell clickable">
          <div class="category-icon"> <img class="file" src="https://mentholgrrl.neocities.org/imageassets/titles/file-playable-blue.png"> </div>
          <div class="category-name"> Music </div>
        </div> </a>
        
        <a href="https://mentholgrrl.neocities.org/carnelian/read-me"> <div class="category-shell clickable">
          <div class="category-icon"> <img class="file" src="https://mentholgrrl.neocities.org/imageassets/titles/file-folder-blue.png"> </div>
          <div class="category-name"> READ ME </div>
        </div> </a>
        
      </div>
    </div>
    
  </body>
  
  </html>
